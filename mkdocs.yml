site_name: HOMER
site_description: High Order Mesh Embeddings and Refinement
site_url: ""
repo_url: https://github.com/abi-breast-biomechanics-group/HOMER

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
  palette:
    scheme: default
    primary: indigo
    accent: indigo

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_root_heading: true
            show_source: false
            merge_init_into_class: true
            members_order: source

nav:
  - Home: index.md
  - Architecture: architecture.md
  - How-To Guides:
    - Working with 3D meshes: how-to/3d-meshes.md
    - Mixed basis functions: how-to/mixed-basis.md
    - Mesh refinement: how-to/refinement.md
    - Basis conversion (rebase): how-to/rebase.md
    - Embedding points: how-to/embedding.md
    - Mesh fitting / optimisation: how-to/fitting.md
    - Secondary fields: how-to/secondary-fields.md
    - Strain evaluation: how-to/strain.md
    - Topology mapping: how-to/topology.md
    - Node indexing: how-to/node-indexing.md
  - API Reference:
    - mesher: api/mesher.md
    - basis_definitions: api/basis_definitions.md
    - fitting: api/fitting.md
    - io: api/io.md
    - geometry: api/geometry.md
    - jacobian_evaluator: api/jacobian_evaluator.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true
